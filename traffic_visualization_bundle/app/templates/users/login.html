<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能交通流量预测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a5f 0%, #2a4d7a 50%, #1a2f4a 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #1e3a5f, #2a4d7a);
            padding: 32px 24px;
            text-align: center;
            color: #fff;
        }

        .login-header .logo-icon {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        .login-header h3 {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 0.85rem;
            opacity: 0.8;
            margin: 0;
        }

        .login-body {
            padding: 32px 28px;
        }

        .form-floating {
            margin-bottom: 16px;
        }

        .form-floating .form-control {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            height: 52px;
        }

        .form-floating .form-control:focus {
            border-color: #4ECDC4;
            box-shadow: 0 0 0 0.2rem rgba(78,205,196,0.15);
        }

        .btn-login {
            width: 100%;
            height: 48px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            background: linear-gradient(135deg, #1e3a5f, #2a4d7a);
            border: none;
            color: #fff;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #2a4d7a, #345d8a);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30,58,95,0.4);
            color: #fff;
        }

        .login-footer {
            text-align: center;
            padding: 0 28px 24px;
        }

        .login-footer a {
            color: #1e3a5f;
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            color: #4ECDC4;
        }

        .alert {
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
        }

        .particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particles-bg span {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .particles-bg span:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
        .particles-bg span:nth-child(2) { left: 25%; animation-delay: 2s; animation-duration: 14s; }
        .particles-bg span:nth-child(3) { left: 40%; animation-delay: 4s; animation-duration: 11s; }
        .particles-bg span:nth-child(4) { left: 55%; animation-delay: 1s; animation-duration: 16s; }
        .particles-bg span:nth-child(5) { left: 70%; animation-delay: 3s; animation-duration: 13s; }
        .particles-bg span:nth-child(6) { left: 85%; animation-delay: 5s; animation-duration: 15s; }
    </style>
</head>
<body>
    <div class="particles-bg">
        <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="login-container" style="position:relative;z-index:1;">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="bi bi-signpost-2"></i>
                </div>
                <h3>智能交通流量预测系统</h3>
                <p>Intelligent Traffic Flow Prediction System</p>
            </div>

            <div class="login-body">
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                {% endif %}

                {% if form.errors %}
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-circle me-1"></i>
                    用户名或密码错误，请重试。
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="form-floating">
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="用户名" required autofocus>
                        <label for="username"><i class="bi bi-person me-1"></i>用户名</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="密码" required>
                        <label for="password"><i class="bi bi-lock me-1"></i>密码</label>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label" for="remember" style="font-size:0.85rem;">
                                记住我
                            </label>
                        </div>
                        <a href="#" style="font-size:0.85rem;color:#1e3a5f;text-decoration:none;">忘记密码？</a>
                    </div>

                    <button type="submit" class="btn btn-login">
                        <i class="bi bi-box-arrow-in-right me-1"></i> 登 录
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <p style="font-size:0.9rem;color:#666;">
                    还没有账户？
                    <a href="{% url 'register' %}">立即注册</a>
                </p>
            </div>
        </div>

        <p class="text-center mt-3" style="color:rgba(255,255,255,0.5);font-size:0.75rem;">
            &copy; 2026 智能交通流量预测系统 v1.0
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
